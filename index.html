<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>numismat.net ürün tarama</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        #info {
            width: 300px;
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            text-align: center;
            background-color: #f9f9f9;
        }

        #info img {
            max-width: 100%;
            margin: 10px auto;
            display: block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 8px;
            text-align: left;
        }

        th {
            font-weight: bold;
            color: #333;
            background-color: #e9ecef; /* Light gray background for headers */
        }

        tr:nth-child(odd) {
            background-color: #f2f2f2; /* Light gray for odd rows */
        }

        tr:nth-child(even) {
            background-color: #ffffff; /* White for even rows */
        }

        tr:hover {
            background-color: #d1ecf1; /* Light blue on hover */
            transition: background-color 0.3s;
        }

        .btn {
            padding: 10px 20px;
            font-size: 16px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <h1>Numismat.net Ürün Tarayıcı</h1>
    
    <div id="info">
        <img id="product-image" src="placeholder.jpg" alt="Ürün Görseli">
        <table>
            <tr>
                <th>Başlık:</th>
                <td id="name-tr">[Henüz taranmadı.]</td>
            </tr>
            <tr>
                <th>Fiyat:</th>
                <td id="price">[Henüz taranmadı.]</td>
            </tr>
            <tr>
                <th>Stok Kodu:</th>
                <td id="model">[Henüz taranmadı.]</td>
            </tr>
        </table>
        <button id="product-link" class="btn" onclick="goToProduct()" style="display:none;">Ürüne Git</button>
        <button id="sold-link" class="btn" onclick="productSold()" style="display:none;">Ürün Satıldı</button>
        <button id="rescan-button" class="btn" onclick="rescan()" style="margin-top: 10px;">Yeniden Tara</button>
    </div>

    <div id="reader__scan_region"></div>

    <script defer>
        <script defer>
    function onScanSuccess(decodedText, decodedResult) {
        console.log(`QR Kod tespit edildi: ${decodedText}`);
        html5Qrcode.stop();  // Stop after successful scan
        fetchProductData(decodedText);  // Fetch product info based on scanned link
    }

    function startQrScanner() {
        const html5Qrcode = new Html5Qrcode("reader__scan_region");
        
        navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: "environment",
                width: { ideal: 1280 },  // High resolution
                height: { ideal: 720 },
                zoom: 1.5  // Set your desired zoom level here
            }
        }).then(stream => {
            html5Qrcode.start(
                { facingMode: "environment" },
                {
                    fps: 10,  // Scanning speed
                    qrbox: 350  // QR code box size, increased for better reading
                },
                onScanSuccess
            ).catch(err => {
                console.error("QR scanner error: ", err);
            });
        }).catch(err => {
            console.error("Could not access the camera: ", err);
        });
    }
        function fetchProductData(qrLink) {
            Papa.parse("products.csv", {
                download: true,
                header: true,
                complete: function(results) {
                    const rows = results.data;
                    const product = rows.find(row => row.link === qrLink);
                    if (product) {
                        document.getElementById("name-tr").innerText = product.name_tr;
                        
                        // Calculate and format price with tax
                        const basePrice = parseFloat(product.price);
                        const taxPrice = (basePrice * 1.2).toFixed(2);
                        document.getElementById("price").innerText = `₺${taxPrice}`;
                        
                        document.getElementById("model").innerText = product.model;
                        document.getElementById("product-image").src = product.image;
                        document.getElementById("product-link").style.display = "inline-block";
                        document.getElementById("sold-link").style.display = "inline-block";
                        document.getElementById("product-link").setAttribute("data-link", product.link);
                    } else {
                        document.getElementById("name-tr").innerText = "[Ürün bulunamadı]";
                        document.getElementById("price").innerText = "[Ürün bulunamadı]";
                        document.getElementById("model").innerText = "[Ürün bulunamadı]";
                        document.getElementById("product-image").src = "placeholder.jpg";
                        document.getElementById("product-link").style.display = "none";
                        document.getElementById("sold-link").style.display = "none";
                    }
                }
            });
        }

        function goToProduct() {
            const link = document.getElementById("product-link").getAttribute("data-link");
            if (link) {
                window.location.href = link;
            }
        }

        function rescan() {
            html5QrcodeScanner.clear();
            html5QrcodeScanner.render(onScanSuccess); // Start scanning again
            // Optionally clear the product information
            document.getElementById("name-tr").innerText = "[Henüz taranmadı.]";
            document.getElementById("price").innerText = "[Henüz taranmadı.]";
            document.getElementById("model").innerText = "[Henüz taranmadı.]";
            document.getElementById("product-image").src = "placeholder.jpg";
            document.getElementById("product-link").style.display = "none";
            document.getElementById("sold-link").style.display = "none";
        }

        function productSold() {
            // Your bot's API token
            const botToken = '5191762597:AAH6kIJsjfuX6DIbbsfskSrBiNTQI5v8bSk';
            // The chat ID of the user or group where you want to send the message
            const chatId = '423739694';
            // The message you want to send
            const messageText = `${document.getElementById("name-tr").innerText} ${document.getElementById("model").innerText} sold. Please remove from the website.`;

            const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&parse_mode=Markdown&text=${messageText}`;

            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: messageText
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.ok) {
                    console.log('Message sent successfully:', data);
                } else {
                    console.error('Error sending message:', data);
                }
            })
            .catch(error => console.error('Request failed:', error));

        }
    </script>
</body>
</html>
