<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>numismat.net ürün tarama</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }
        
        #reader {
            width: 300px;
            margin: 20px auto;
        }
        
        #result {
            margin-top: 20px;
            font-size: 18px;
        }
        
        #product-image {
            max-width: 200px;
            margin-top: 10px;
            border-radius: 10px;
        }

        .btn {
            padding: 10px 20px;
            font-size: 16px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <!-- <div id="result">
        <p id="name-tr"></p>
        <img id="product-image" src="" alt="Product Image" style="display:none;">
        <button id="product-link" class="btn" onclick="goToProduct()" style="display:none;">Go to Product</button>
    </div> -->

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        #info {
            width: 300px;
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            text-align: center;
            background-color: #f9f9f9;
        }
        #info img {
            max-width: 100px;
            margin: 10px auto;
            display: block;
        }
        .info-text {
            font-size: 16px;
            margin: 5px 0;
        }
        #reader__scan_region {
            width: 300px;
            margin-top: 20px;
        }
        .btn {
            margin-top: 10px;
            padding: 8px 12px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>QR Kod Ürün Tarayıcı</h1>
    
    <div id="info">
        <img id="product-image" src="placeholder.jpg" alt="Ürün Görseli" style="max-width: 100%;">
        <table>
            <tr>
                <th>Başlık:</th>
                <td id="name-tr">[Henüz taranmadı.]</td>
            </tr>
            <tr>
                <th>Fiyat:</th>
                <td id="price">[Henüz taranmadı.]</td>
            </tr>
            <tr>
                <th>Stok Kodu:</th>
                <td id="model">[Henüz taranmadı.]</td>
            </tr>
        </table>
        <button id="product-link" class="btn" onclick="goToProduct()" style="display:none;">Ürüne Git</button>
    </div>

    <div id="reader__scan_region"></div>

    <script defer>
        function onScanSuccess(qrMessage) {
            console.log(`QR Kod tespit edildi: ${qrMessage}`);
            html5QrcodeScanner.clear();
            fetchProductData(qrMessage);
        }

        const html5QrcodeScanner = new Html5QrcodeScanner("reader__scan_region", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);

        function fetchProductData(qrLink) {
            Papa.parse("products.csv", {
                download: true,
                header: true,
                complete: function(results) {
                    const rows = results.data;
                    const product = rows.find(row => row.link === qrLink);
                    if (product) {
                        document.getElementById("name-tr").innerText = product.name_tr;
                        
                        // Calculate and format price with tax
                        const basePrice = parseFloat(product.price);
                        const taxPrice = (basePrice * 1.2).toFixed(2);
                        document.getElementById("price").innerText = `₺${taxPrice}`;
                        
                        document.getElementById("model").innerText = product.model;
                        document.getElementById("product-image").src = product.image;
                        document.getElementById("product-link").style.display = "inline-block";
                        document.getElementById("product-link").setAttribute("data-link", product.link);
                    } else {
                        document.getElementById("name-tr").innerText = "[Ürün bulunamadı]";
                        document.getElementById("price").innerText = "[Ürün bulunamadı]";
                        document.getElementById("model").innerText = "[Ürün bulunamadı]";
                        document.getElementById("product-image").src = "placeholder.jpg";
                        document.getElementById("product-link").style.display = "none";
                    }
                }
            });
        }

        function goToProduct() {
            const link = document.getElementById("product-link").getAttribute("data-link");
            if (link) {
                window.location.href = link;
            }
        }
    </script>
</body>
</html>
